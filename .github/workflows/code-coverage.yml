# This workflow runs the backend and frontend test suites, generates
# Cobertura XML coverage reports, and uploads them to GitHub so coverage
# results appear automatically on pull requests (GitHub Code Quality).
name: Code Coverage

# Run on pushes to the default branch (to establish the baseline) and on
# pull requests (to compare against it). Code Quality compares PR branch
# coverage to the default branch, so both triggers are needed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The `code-quality: write` permission is required to upload coverage data.
# No other elevated permissions are needed.
permissions:
  contents: read
  code-quality: write

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      # Check out the PR head commit (not the merge commit) so coverage
      # line numbers map correctly to the diff.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: backend/coverage/cobertura-coverage.xml
          language: JavaScript
          label: code-coverage/backend

  frontend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: frontend/coverage/cobertura-coverage.xml
          language: JavaScript
          label: code-coverage/frontend
